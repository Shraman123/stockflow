version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: stockflow-db
    environment:
      POSTGRES_DB: stockflowdb
      POSTGRES_USER: stockflowuser
      POSTGRES_PASSWORD: stockflowpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: stockflow-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=supersecretkey-change-in-production-32chars!!
      - DATABASE_URL=postgresql://stockflowuser:stockflowpass@db:5432/stockflowdb
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: stockflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
